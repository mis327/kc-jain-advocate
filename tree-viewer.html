<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Information - KC Jain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a1a2f 0%, #1e3a5f 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .header {
            background: linear-gradient(135deg, #0a1a2f 0%, #1e3a5f 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .header .subtitle {
            color: #c9a959;
        }
        .content {
            padding: 30px;
        }
        .detail-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .detail-row {
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
        }
        .detail-label {
            font-weight: 700;
            color: #0a1a2f;
            width: 140px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .detail-value {
            flex: 1;
            color: #334155;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .image-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 2px solid #e2e8f0;
        }
        .image-grid img:hover {
            transform: scale(1.05);
            border-color: #c9a959;
        }
        video {
            width: 100%;
            border-radius: 16px;
            margin-top: 15px;
        }
        .description-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .back-btn {
            background: #c9a959;
            color: #0a1a2f;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .back-btn:hover {
            background: #b38f3f;
            transform: translateY(-2px);
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        .error {
            text-align: center;
            padding: 60px;
            color: #ef4444;
        }
        @media (max-width: 640px) {
            .detail-row {
                flex-direction: column;
            }
            .detail-label {
                width: 100%;
                margin-bottom: 5px;
            }
            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌳 Tree Plantation Initiative</h1>
            <div class="subtitle">Planting a greener tomorrow</div>
        </div>
        <div class="content" id="tree-content">
            <div class="loading">
                <div style="width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top-color: #c9a959; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                Loading tree information...
            </div>
        </div>
        <div style="padding: 0 30px 30px;">
        </div>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        // Get tree ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const treeId = urlParams.get('id');
        
        async function loadTreeData() {
            if (!treeId) {
                document.getElementById('tree-content').innerHTML = `
                    <div class="error">
                        <h3>❌ No Tree ID Found</h3>
                        <p>This QR code appears to be invalid.</p>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch(`/api/qr/${treeId}`);
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('tree-content').innerHTML = `
                        <div class="error">
                            <h3>❌ Tree Not Found</h3>
                            <p>This tree information could not be found.</p>
                        </div>
                    `;
                    return;
                }
                
                // Build HTML with all tree details
                let html = '';
                
                // Tree Name and Basic Info
                html += `<div class="detail-card">`;
                html += `<h2 style="color: #c9a959; margin-bottom: 15px;">${escapeHtml(data.tree_name || 'Unnamed Tree')}</h2>`;
                html += `<div class="detail-row"><span class="detail-label"><i class="fas fa-barcode"></i> Tree ID:</span><span class="detail-value">${escapeHtml(data.tree_id)}</span></div>`;
                if (data.scientific_name) {
                    html += `<div class="detail-row"><span class="detail-label"><i class="fas fa-leaf"></i> Scientific Name:</span><span class="detail-value">${escapeHtml(data.scientific_name)}</span></div>`;
                }
                if (data.tree_height) {
                    html += `<div class="detail-row"><span class="detail-label"><i class="fas fa-ruler-vertical"></i> Height:</span><span class="detail-value">${escapeHtml(data.tree_height)} ft</span></div>`;
                }
                if (data.girth_size) {
                    html += `<div class="detail-row"><span class="detail-label"><i class="fas fa-arrows-alt-h"></i> Girth Size:</span><span class="detail-value">${escapeHtml(data.girth_size)}</span></div>`;
                }
                if (data.canopy_size) {
                    html += `<div class="detail-row"><span class="detail-label"><i class="fas fa-circle"></i> Canopy Size:</span><span class="detail-value">${escapeHtml(data.canopy_size)}</span></div>`;
                }
                if (data.watering_frequency) {
                    html += `<div class="detail-row"><span class="detail-label"><i class="fas fa-tint"></i> Watering Frequency:</span><span class="detail-value">${escapeHtml(data.watering_frequency)}</span></div>`;
                }
                if (data.last_maintenance) {
                    html += `<div class="detail-row"><span class="detail-label"><i class="fas fa-calendar-alt"></i> Last Maintenance:</span><span class="detail-value">${formatDate(data.last_maintenance)}</span></div>`;
                }
                if (data.next_maintenance) {
                    html += `<div class="detail-row"><span class="detail-label"><i class="fas fa-calendar-check"></i> Next Maintenance:</span><span class="detail-value">${formatDate(data.next_maintenance)}</span></div>`;
                }
                html += `</div>`;
                
                // Description
                if (data.description) {
                    html += `<div class="description-box">`;
                    html += `<strong><i class="fas fa-file-alt"></i> Description:</strong><br>`;
                    html += `<p style="margin-top: 10px; line-height: 1.8;">${escapeHtml(data.description)}</p>`;
                    html += `</div>`;
                }
                
                // Special Notes
                if (data.special_notes) {
                    html += `<div class="description-box" style="background: #fef3c7;">`;
                    html += `<strong><i class="fas fa-sticky-note"></i> Special Notes:</strong><br>`;
                    html += `<p style="margin-top: 10px;">${escapeHtml(data.special_notes)}</p>`;
                    html += `</div>`;
                }
                
                // Tree Images
                if (data.tree_image_urls) {
                    try {
                        const images = JSON.parse(data.tree_image_urls);
                        if (images && images.length > 0) {
                            html += `<div class="detail-card">`;
                            html += `<h3><i class="fas fa-images"></i> Tree Images</h3>`;
                            html += `<div class="image-grid">`;
                            images.forEach(img => {
                                html += `<img src="${img.url}" onclick="window.open('${img.url}')" loading="lazy">`;
                            });
                            html += `</div></div>`;
                        }
                    } catch(e) {}
                }
                
                // Tree Video
                if (data.tree_video_url && data.tree_video_url !== 'undefined') {
                    html += `<div class="detail-card">`;
                    html += `<h3><i class="fas fa-video"></i> Tree Video</h3>`;
                    html += `<video controls src="${data.tree_video_url}"></video>`;
                    html += `</div>`;
                }
                
                document.getElementById('tree-content').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading tree data:', error);
                document.getElementById('tree-content').innerHTML = `
                    <div class="error">
                        <h3>❌ Error Loading Data</h3>
                        <p>Please check your internet connection and try again.</p>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-IN', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
            } catch {
                return dateStr;
            }
        }
        
        function goBack() {
            window.location.href = '/index.html';
        }
        
        // Load the tree data
        loadTreeData();
    </script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
